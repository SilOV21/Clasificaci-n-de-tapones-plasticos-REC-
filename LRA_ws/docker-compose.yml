services:
  my_changes_app:
    build: .
    container_name: lra_vision
    tty: true
    privileged: true

    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1

    volumes:
      - .:/root/lra_ws
      - /tmp/.X11-unix:/tmp/.X11-unix

    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1
      - /dev/video2:/dev/video2
      - /dev/video3:/dev/video3

    stdin_open: true

    entrypoint: /entrypoint.sh
