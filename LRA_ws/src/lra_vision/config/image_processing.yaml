# =============================================================================
# LRA Vision Package - Image Processing Configuration
# Settings for plastic cap detection and classification
# ROS2 Jazzy Jalisco
# =============================================================================

# Preprocessing Parameters
preprocessing:
  # Gaussian Blur
  blur:
    enabled: true
    kernel_size: 5
    sigma: 1.5
  
  # Color Space Conversion
  color_space: "HSV"  # "HSV", "LAB", "RGB", "GRAY"

# Segmentation Parameters
segmentation:
  # Thresholding
  threshold:
    method: "adaptive"  # "global", "adaptive", "otsu"
    value: 128
    adaptive_method: "mean"  # "mean", "gaussian"
    block_size: 11
    c: 2
  
  # Morphological Operations
  morphology:
    kernel_size: 3
    iterations: 2
    operation: "open_close"  # "open", "close", "open_close"

# Contour Detection Parameters
contours:
  # Mode
  mode: "external"  # "external", "list", "all"
  
  # Method
  method: "simple"  # "simple", "approx", "none"
  
  # Filtering
  min_area: 500.0
  max_area: 50000.0
  min_circularity: 0.6
  max_circularity: 1.1
  
  # Approximation
  epsilon_factor: 0.02  # For polygon approximation

# Color Classification Parameters
color_detection:
  # Color ranges in HSV space
  ranges:
    # Red (two ranges due to hue wraparound)
    red:
      lower1: [0, 100, 50]
      upper1: [10, 255, 255]
      lower2: [170, 100, 50]
      upper2: [180, 255, 255]
      display_color: [0, 0, 255]  # BGR for visualization
    
    # Blue
    blue:
      lower: [100, 100, 50]
      upper: [130, 255, 255]
      display_color: [255, 0, 0]
    
    # Green
    green:
      lower: [40, 100, 50]
      upper: [80, 255, 255]
      display_color: [0, 255, 0]
    
    # Yellow
    yellow:
      lower: [20, 100, 50]
      upper: [40, 255, 255]
      display_color: [0, 255, 255]
    
    # Orange
    orange:
      lower: [10, 100, 50]
      upper: [20, 255, 255]
      display_color: [0, 165, 255]
    
    # White
    white:
      lower: [0, 0, 200]
      upper: [180, 50, 255]
      display_color: [255, 255, 255]
    
    # Black
    black:
      lower: [0, 0, 0]
      upper: [180, 50, 50]
      display_color: [50, 50, 50]

# Cap Classification Parameters
cap_classification:
  # Minimum detection confidence
  min_confidence: 0.5
  
  # Aspect ratio limits (width/height)
  aspect_ratio:
    min: 0.7
    max: 1.3
  
  # Solidity (area/convex_hull_area)
  solidity:
    min: 0.8
    max: 1.0
  
  # Feature extraction for ML (optional)
  ml_enabled: false
  model_path: ""

# Visualization Parameters
visualization:
  show_preprocessing: false
  show_contours: true
  show_masks: false
  show_labels: true
  
  # Output image settings
  overlay_alpha: 0.3
  label_font_scale: 0.5
  label_font_thickness: 1

# ROS2 Topics
topics:
  image_input: "camera/image_raw"
  image_output: "vision/processed_image"
  detections: "vision/cap_detections"
  classification: "vision/cap_classification"

# Frame IDs
frames:
  camera_optical_frame: "camera_optical_frame"
  world_frame: "world"