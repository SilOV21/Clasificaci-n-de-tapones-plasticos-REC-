# =============================================================================
# LRA Vision Package - Camera Mount Configuration
# TF transforms for Logitech StreamCam on UR3 robotic arm
# Camera mounted 5cm above end effector (tool0)
# ROS2 Jazzy Jalisco
# =============================================================================

# Camera Mount Configuration
camera_mount:
  # Parent frame (UR3 end effector)
  parent_frame: "tool0"
  
  # Camera link frame
  camera_frame: "camera_link"
  
  # Optical frame (Z-forward convention)
  optical_frame: "camera_optical_frame"
  
  # Translation from parent frame (in meters)
  translation:
    x: 0.0      # Forward (+X in tool0 frame)
    y: 0.0      # Left (+Y in tool0 frame)
    z: 0.05     # Up (+Z in tool0 frame) - 5cm above UR3
  
  # Rotation (RPY in radians)
  rotation:
    roll: 0.0           # Rotation about X-axis
    pitch: 3.14159      # Rotation about Y-axis (PI = 180°, pointing down)
    yaw: 0.0            # Rotation about Z-axis

# Alternative Mounting Configurations
mounting_presets:
  # Default overhead mounting
  overhead:
    translation: {x: 0.0, y: 0.0, z: 0.05}
    rotation: {roll: 0.0, pitch: 3.14159, yaw: 0.0}
    description: "Camera mounted 5cm above tool0, pointing down"
  
  # Angled mounting (45 degrees from vertical)
  angled_45:
    translation: {x: 0.035, y: 0.0, z: 0.035}
    rotation: {roll: 0.0, pitch: 2.35619, yaw: 0.0}  # 3π/4 radians
    description: "Camera mounted at 45° angle, 5cm from tool0"
  
  # In-hand mounting (looking forward)
  in_hand:
    translation: {x: 0.05, y: 0.0, z: 0.02}
    rotation: {roll: 0.0, pitch: 0.0, yaw: 0.0}
    description: "Camera mounted on gripper, looking forward"
  
  # Side mounting
  side:
    translation: {x: 0.0, y: 0.05, z: 0.05}
    rotation: {roll: 1.5708, pitch: 3.14159, yaw: 0.0}  # 90° roll
    description: "Camera mounted on side, pointing down"

# TF Broadcasting Settings
tf_settings:
  publish_rate: 30.0  # Hz
  static_transform: true  # Use static transform for fixed mounting
  timeout: 0.5  # Transform lookup timeout in seconds

# Logitech StreamCam Specific Parameters
streamcam:
  # Physical dimensions (for reference)
  dimensions:
    width: 0.073   # 73mm
    height: 0.019  # 19mm
    depth: 0.029  # 29mm
    weight: 0.113  # 113g
  
  # Optical center offset from mount point
  optical_center_offset:
    x: 0.0
    y: 0.0
    z: 0.01  # 1cm from physical mount point to optical center

# UR3 Tool Center Point (TCP) Configuration
ur3_tcp:
  # Distance from tool0 to TCP (if different from tool0)
  offset: 0.0  # meters
  frame: "tool0"  # tool0 is the TCP for this configuration